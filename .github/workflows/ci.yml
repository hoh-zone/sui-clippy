name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
        with:
          components: clippy
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
